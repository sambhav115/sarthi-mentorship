services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: sarthi-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=sarthi
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Express Backend
  server:
    build: ./server
    container_name: sarthi-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sarthi
      - JWT_SECRET=sarthi_mentorship_jwt_secret_2026
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - CLIENT_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - postgres
    restart: unless-stopped

  # React Frontend
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: sarthi-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pg-data:
