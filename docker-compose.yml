services:
  # MongoDB Database
  mongo:
    image: mongo:7
    container_name: sarthi-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  # Express Backend
  server:
    build: ./server
    container_name: sarthi-server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/sarthi
      - JWT_SECRET=sarthi_mentorship_jwt_secret_2026
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GMAIL_USER=${GMAIL_USER:-}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-}
      - CLIENT_URL=http://localhost:3000
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      - mongo
    restart: unless-stopped

  # React Frontend
  client:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000/api
    container_name: sarthi-client
    ports:
      - "3000:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  mongo-data:
